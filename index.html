<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" /><!--指定网页所用字符集，一般指定utf-8为Unicode 字符编码-->
    <meta name="viewport" content="width=device-width" /><!--响应式网站指定以自适应手机端和电脑端显示-->
    <meta name="description" content=""><!--为网页定义描述内容-->
    <meta name="robots" content="all,follow">
    <meta name="keywords" content="HTML, CSS, XML, XHTML, JS"><!--为搜索引擎定义关键词（keywords）-->
    <meta name="author" content="pcgzdw"><!--定义网页作者（author）-->
    <!-- http-equiv属性为 content 属性的信息/值提供HTTP标头，http-equiv属性可用于模拟HTTP响应标头。-->
    <!-- <meta http-equiv="content-type" content="text/html; charset=UTF-8">-->
    <!-- 定义浏览器的渲染方式; 如果浏览器优先按content值的最右边如下面的edge来渲染，在IE9与edge间的浏览器会按IE9来渲染，IE9以下的则不支持 -->
    <!-- <meta http-equiv="X-UA-Compatible" content="IE=9;IE=edge"> -->
    <!-- 下面content 属性的值必须匹配同一文档中的一个link元素上的 title 属性的值，或者必须匹配同一文档中的一个 style 元素上的 title 属性的值-->
    <!--<meta http-equiv="default-style" content="the document's preferred stylesheet"> -->
    <!-- 定义文档自动刷新的时间间隔,单位为秒,值 "refresh" 应该慎重使用，因为它会使得页面不受用户控制。 -->
    <!-- <meta http-equiv="refresh" content="10"> -->
    <meta name="robots" content="all,follow">
    <script src="scripts/main.js" type="module"></script>
    <link href="styles/bootstrap.min.css" rel="stylesheet"/>
    <link href="styles/my.css" rel="stylesheet"/>
    <title>My test page</title>
  </head>
  <body>
    <div id="accordion">
      <div class="card">
        <div class="card-header">
          <a class="btn" data-bs-toggle="collapse" href="#collapseOne">
            入库管理
          </a>
        </div>
        <div id="collapseOne" class="collapse show" data-bs-parent="#accordion">
          <ul class="card-body nav flex-column d-grid gap-1">
           <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">钢坯购货情况录入</button></li> 
           <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">磅单录入</button></li>
           <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">月末入库表生成</button></li>
           </ul>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <a
            class="collapsed btn"
            data-bs-toggle="collapse"
            href="#collapseTwo"
          >
            生产管理
          </a>
        </div>
        <div id="collapseTwo" class="collapse" data-bs-parent="#accordion">
          <ul class="card-body nav flex-column d-grid gap-1">
            <li class="nav-ite"><button type="button" class="btn btn-info text-white btn-sm btn-block">生产计划录入</button></li>
            <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">断料计划生成和打印</button></li>
            <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">生产周转卡打印</button></li>
            <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">钢管生产情况录入</button></li>
          </ul>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <a
            class="collapsed btn"
            data-bs-toggle="collapse"
            href="#collapseThree"
          >
           出库管理
          </a>
        </div>
        <div id="collapseThree" class="collapse" data-bs-parent="#accordion">
          <ul class="card-body nav flex-column d-grid gap-1">
            <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">本轮生产使用钢坯出库</button></li>
            <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">钢坯退货及外销出库</button></li>
            <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">月末出库表生成</button></li>
          </ul>
        </div>
        <div class="card-header">
            <a
              class="collapsed btn"
              data-bs-toggle="collapse"
              href="#collapsefour"
            >
             库存查询
            </a>
          </div>
          <div id="collapsefour" class="collapse" data-bs-parent="#accordion">
            <ul class="card-body nav flex-column d-grid gap-1">
              <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">按使用类型查询钢种库存</button></li>
              <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">库存总体情况表</button></li>
              <li class="nav-item"><button type="button" class="btn btn-info text-white btn-sm btn-block">已断未使用余料表</button></li>
            </ul>
          </div>
      </div>
    </div> 
 <script src="scripts/bootstrap.bundle.min.js" type="module"></script>
  </body>
</html>
